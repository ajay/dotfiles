- defaults:
    link:
      backup: true
      create: true
      relink: true

- shell-sudo:
  - shell:
      - - sudo -v
        - "=> shell-sudo: Caching sudo"

- shell-git:
  - shell:
      - - git pull
        - "=> shell-git: Pull"
      - - git submodule sync --recursive && git submodule update --init --recursive
        - "=> shell-git: Update submodules"
      - - test -z "$(git status --porcelain)"
        - "=> shell-git: Check if dirty"

- clean:
    - '~'
    - '~/.config/fish'
    - '~/.local/bin'
    - '~/.claude/projects/-home-ajaysriv'
    - '~/.claude/projects/-home-ajaysriv--dotfiles'
    - '~/.claude/projects/-home-ajaysriv-fbsource'

- link:
    ~/.config/fish/config.fish: dotfiles/fish/config.fish
    ~/.config/fish/functions: dotfiles/fish/functions/
    ~/.claude/commands: private/dotfiles/claude/commands/
    ~/.claude/settings.json: private/dotfiles/claude/settings.json
    ~/.claude/settings.local.json: private/dotfiles/claude/settings.local.json
    ~/.claude/projects/-home-ajaysriv/memory: private/dotfiles/claude/projects/home/memory/
    ~/.claude/projects/-home-ajaysriv--dotfiles/memory: private/dotfiles/claude/projects/dotfiles/memory/
    ~/.claude/projects/-home-ajaysriv-fbsource/memory: private/dotfiles/claude/projects/fbsource/memory/
    ~/.config/sublime-text/Packages/User: dotfiles/sublime-text/Packages/User/
    ~/.gitconfig: dotfiles/git/gitconfig
    ~/.hgrc: dotfiles/hg/hgrc
    ~/.local/bin/ajay-github-repo-manager: scripts/ajay-github-repo-manager
    ~/.local/bin/ajay-github-repo-updater: scripts/ajay-github-repo-updater
    ~/.local/bin/ajay-github-submodule-updater: scripts/ajay-github-submodule-updater
    ~/.local/bin/ajay-dotfiles-private-sync: scripts/ajay-dotfiles-private-sync
    ~/.local/bin/ajay-workspace-setup: scripts/ajay-workspace-setup

- shell-build-tools-deps:
  - shell:
      - - sudo -v && make -C tools/build-tools deps-install
        - "=> shell-build-tools-deps: install build-tools deps"

- shell-dnf-update:
  - if: 'test -d /opt/facebook'
    shell:
      - - sudo -v && sudo dnf -y up-no-meta --refresh --disablerepo=zoom
        - "=> shell-dnf-update: Update (Meta)"
  - if: 'test ! -d /opt/facebook'
    shell:
      - - sudo -v && sudo dnf -y update --refresh
        - "=> shell-dnf-update: Update"

- shell-dnf:
  - shell:
      - - sudo -v && sudo dnf -y install
          akmods
          ansifilter
          apcalc
          fedora-workstation-repositories
          fish
          gh
          gnome-tweaks
          htop
          less
          meld
          python3-pip
          remove-retired-packages
          source-highlight
          strace
          vim
          vlc
          xclip
        - "=> shell-dnf: Installing packages"
      - - sudo -v && sudo dnf -y config-manager setopt google-chrome.enabled=1 && sudo dnf -y install google-chrome-stable
        - "=> shell-dnf: Installing Google Chrome"
      - - sudo -v && sudo rpm -v --import https://download.sublimetext.com/sublimehq-rpm-pub.gpg && sudo dnf -y config-manager addrepo --overwrite --from-repofile=https://download.sublimetext.com/rpm/stable/x86_64/sublime-text.repo && sudo dnf -y install sublime-text
        - "=> shell-dnf: Installing Sublime Text"
      - - sudo -v && sudo dnf -y remove
          hydrapaper
        - "=> shell-dnf: Removing packages"
      - - sudo -v && sudo dnf -y autoremove
        - "=> shell-dnf: autoremove"
      - - sudo -v && sudo akmods
        - "=> shell-dnf: akmods"
      - - sudo -v && yes | sudo remove-retired-packages
        - "=> shell-dnf: remove-retired-packages"

- shell-nvidia:
  - if: 'lspci -d 10de:: -nn | grep -Eiq "VGA compatible|3D controller"'
    shell:
      - - sudo -v && sudo dnf -y config-manager setopt rpmfusion-nonfree-nvidia-driver.enabled=1 && sudo dnf -y install akmod-nvidia xorg-x11-drv-nvidia-cuda
        - "=> shell-nvidia: install NVIDIA driver (reboot afterwards)"

- shell-insync:
  - shell:
      - - sudo -v && sudo rpm --import https://d2t3ff60b2tol4.cloudfront.net/repomd.xml.key
        - "=> shell-insync: import GPG key"
      - - 'printf "[insync]\nname=Insync\nbaseurl=http://yum.insync.io/fedora/\$releasever/\ngpgcheck=1\ngpgkey=https://d2t3ff60b2tol4.cloudfront.net/repomd.xml.key\nenabled=1\n" | sudo tee /etc/yum.repos.d/insync.repo'
        - "=> shell-insync: add yum repo"
      - - sudo -v && sudo dnf -y install insync
        - "=> shell-insync: install"

- shell-pip:
  - pip:
      file: scripts/requirements.txt
      binary: python3 -m pip
      user: true
      upgrade: true
      stdout: true
      stderr: true

- shell-gnome-extensions:
  - shell:
      - - gext install vertical-workspaces@G-dH.github.com
        - "=> shell-gnome-extensions: V-Shell"
      - - gext install tactile@lundal.io
        - "=> shell-gnome-extensions: Tactile"
      - - gext install caffeine@patapon.info
        - "=> shell-gnome-extensions: Caffeine"
      - - gext install Vitals@CoreCoding.com
        - "=> shell-gnome-extensions: Vitals"

- shell-gnome-extension-settings:
  - shell:
      - - dconf write /org/gnome/shell/extensions/vertical-workspaces/dash-position 3
        - "=> shell-gnome-extension-settings: V-Shell dash position left"
      - - dconf write /org/gnome/shell/extensions/vertical-workspaces/dash-position-adjust 0
        - "=> shell-gnome-extension-settings: V-Shell dash centered"
      - - dconf write /org/gnome/shell/extensions/vertical-workspaces/ws-thumbnails-position 1
        - "=> shell-gnome-extension-settings: V-Shell ws thumbnails right"
      - - dconf write /org/gnome/shell/extensions/vertical-workspaces/wst-position-adjust 0
        - "=> shell-gnome-extension-settings: V-Shell ws thumbnails centered"
      - - dconf write /org/gnome/shell/extensions/vitals/icon-style 1
        - "=> shell-gnome-extension-settings: Vitals icon style monochrome"
      - - dconf write /org/gnome/shell/extensions/vitals/show-battery true
        - "=> shell-gnome-extension-settings: Vitals show battery"
      - - dconf write /org/gnome/shell/extensions/vitals/show-gpu true
        - "=> shell-gnome-extension-settings: Vitals show GPU"
      - - dconf write /org/gnome/shell/extensions/vitals/update-time 1
        - "=> shell-gnome-extension-settings: Vitals update time 1s"
      - - dconf write /org/gnome/shell/extensions/vitals/use-higher-precision true
        - "=> shell-gnome-extension-settings: Vitals higher precision"

- shell-gsettings-tweaks:
  - shell:
      - - gsettings set org.gnome.desktop.wm.preferences button-layout 'appmenu:close'
        - "=> shell-gsettings-tweaks: titlebar close button only"
      - - gsettings set org.gnome.desktop.interface gtk-enable-primary-paste true
        - "=> shell-gsettings-tweaks: enable middle-click paste"

- shell-chsh:
  - shell:
      - - 'test "$(getent passwd $USER | cut -d: -f7)" = "/usr/bin/fish" || { sudo -v && sudo chsh -s /usr/bin/fish $USER; }'
        - "=> shell-chsh: set default shell to fish"

- shell-gsettings:
  - shell:
      - - gsettings set org.gnome.shell disable-extension-version-validation true
        - "=> shell-gsettings: disable extension version validation"
      - - gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
        - "=> shell-gsettings: dark style"
      - - gsettings set org.gnome.mutter dynamic-workspaces false
        - "=> shell-gsettings: fixed number of workspaces"
      - - gsettings set org.gnome.desktop.wm.preferences num-workspaces 6
        - "=> shell-gsettings: 6 workspaces"
      - - gsettings set org.gnome.mutter workspaces-only-on-primary false
        - "=> shell-gsettings: workspaces on all displays"
      - - gsettings set org.gnome.desktop.interface clock-show-weekday true
        - "=> shell-gsettings: clock show weekday"
      - - gsettings set org.gnome.desktop.interface clock-show-date true
        - "=> shell-gsettings: clock show date"
      - - gsettings set org.gnome.desktop.interface clock-show-seconds true
        - "=> shell-gsettings: clock show seconds"
      - - gsettings set org.gnome.desktop.calendar show-weekdate true
        - "=> shell-gsettings: calendar show week numbers"
      - - gsettings set org.gnome.desktop.interface show-battery-percentage true
        - "=> shell-gsettings: show battery percentage"
      - - gsettings set org.gnome.settings-daemon.plugins.power sleep-inactive-ac-type 'nothing'
        - "=> shell-gsettings: disable suspend when plugged in"
      - - gsettings set org.gnome.shell favorite-apps "['org.gnome.Ptyxis.desktop', 'org.gnome.Nautilus.desktop', 'google-chrome.desktop', 'sublime_text.desktop']"
        - "=> shell-gsettings: dock favorites"

- shell-keybindings:
  - shell:
      - - gsettings set org.gnome.desktop.wm.keybindings switch-applications "[]"
        - "=> shell-keybindings: switch-applications: unbind"
      - - gsettings set org.gnome.desktop.wm.keybindings switch-applications-backward "[]"
        - "=> shell-keybindings: switch-applications-backward: unbind"
      - - gsettings set org.gnome.desktop.wm.keybindings switch-windows "['<Alt>Tab']"
        - "=> shell-keybindings: switch-windows: Alt+Tab"
      - - gsettings set org.gnome.desktop.wm.keybindings switch-windows-backward "['<Shift><Alt>Tab']"
        - "=> shell-keybindings: switch-windows-backward: Shift+Alt+Tab"
      - - gsettings set org.gnome.settings-daemon.plugins.media-keys custom-keybindings "['/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/']"
        - "=> shell-keybindings: register custom0"
      - - gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybinding:/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/ name 'Terminal'
        - "=> shell-keybindings: custom0 name"
      - - gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybinding:/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/ command 'ptyxis --new-window'
        - "=> shell-keybindings: custom0 command"
      - - gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybinding:/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/ binding '<Control><Alt>t'
        - "=> shell-keybindings: custom0 binding"

- shell-timezone:
  - shell:
      - - gsettings set org.gnome.desktop.datetime automatic-timezone false
        - "=> shell-timezone: disable automatic timezone"
      - - sudo -v && sudo timedatectl set-timezone America/Los_Angeles
        - "=> shell-timezone: set timezone to America/Los_Angeles"

- shell-wallpaper:
  - shell:
      - - gsettings set org.gnome.desktop.background picture-uri "file://$PWD/dotfiles/wallpaper/flowers.jpg"
        - "=> shell-wallpaper: picture-uri"
      - - gsettings set org.gnome.desktop.background picture-uri-dark "file://$PWD/dotfiles/wallpaper/flowers.jpg"
        - "=> shell-wallpaper: picture-uri-dark"
  - if: 'test "$(hostnamectl chassis)" = "desktop"'
    shell:
      - - gsettings set org.gnome.desktop.background picture-options 'spanned'
        - "=> shell-wallpaper: picture-options spanned (desktop)"
  - if: 'test "$(hostnamectl chassis)" != "desktop"'
    shell:
      - - gsettings set org.gnome.desktop.background picture-options 'zoom'
        - "=> shell-wallpaper: picture-options zoom (non-desktop)"

- shell-meta-chef:
  - shell:
      - - sudo -v && sudo soloctl -Hic && sudo -v && sudo soloctl -Hic
        - "=> shell-meta-chef: mr. chef"
